<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Live Orders</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding: 30px 5%; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .order-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .order-table th, .order-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .order-table th { background-color: #2575fc; color: white; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background-color: #ffeaa7; color: #d63031; }
        .status-shipped { background-color: #badc58; color: #6ab04c; }
        .refresh-btn { padding: 10px 20px; background-color: #2575fc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyStore - Google Sheets Admin Panel</div>
        <div><strong>Welcome, Owner Anand</strong></div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Live Customer Orders (From Google Sheet)</h2>
            <button onclick="loadOrders()" class="refresh-btn">🔄 Refresh Orders</button>
        </div>
        
        <table class="order-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Delivery Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" style="text-align:center; padding:20px; color:#aaa;">Loading orders from Google Sheet...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycby8tSZCuEDG-PBbcvgpTl9IIqIlOdqsHlzmYC7CSVL-astMMWO1zs3Rr7EeAWADgCQ/exec";

        function loadOrders() {
            const tableBody = document.getElementById('ordersTableBody');
            
            fetch(scriptUrl)
            .then(response => response.json())
            .then(orders => {
                tableBody.innerHTML = "";

                if (orders.length === 0) {
                    tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:20px; color:#aaa;">No orders found in Google Sheet.</td></tr>;
                    return;
                }

                // Show recent orders first
                orders.reverse().forEach(order => {
                    const tr = document.createElement('tr');
                    const statusClass = order.status === 'Pending' ? 'status-pending' : 'status-shipped';

                    tr.innerHTML = `
                        <td>#${order.id}</td>
                        <td><strong>${order.name}</strong></td>
                        <td>${order.phone}</td>
                        <td>${order.product}</td>
                        <td>$${order.price}</td>
                        <td>${order.address}</td>
                        <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(error => {
                tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:20px; color:red;">Error loading data from Google Sheet.</td></tr>;
                console.error(error);
            });
        }

        window.onload = loadOrders;
        // Auto refresh table every 15 seconds
        setInterval(loadOrders, 15000); 
    </script>
</body>
</html>
