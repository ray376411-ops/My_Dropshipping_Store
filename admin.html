<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Control Terminal | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <tbody id="pipeline-rows"></tbody>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('live_orders/').on('value', (snapshot) => {
            const rowsContainer = document.getElementById('pipeline-rows');
            if(!rowsContainer) return;
            rowsContainer.innerHTML = "";
            
            const data = snapshot.val();
            if(!data) {
                rowsContainer.innerHTML = <tr><td colspan="6">Pipeline empty.</td></tr>;
                return;
            }

            Object.values(data).reverse().forEach(order => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${order.orderId || '---'}</td>
                    <td>${order.time || '---'}</td>
                    <td>${order.customerName || '---'}</td>
                    <td>${order.itemsPurchased || '---'}</td>
                    <td>${order.totalAmount || '---'}</td>
                    <td>${order.status || 'Pending'}</td>
                `;
                rowsContainer.appendChild(tr);
            });
        });
    </script>
</body>
</html>
