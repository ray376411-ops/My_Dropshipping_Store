<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Operation 300</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Live Orders Panel</h1>
            <div class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md">
                Operation 300
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="p-4 text-gray-600 font-semibold">Customer</th>
                        <th class="p-4 text-gray-600 font-semibold">Product</th>
                        <th class="p-4 text-gray-600 font-semibold">Price</th>
                        <th class="p-4 text-gray-600 font-semibold">Status</th>
                        <th class="p-4 text-gray-600 font-semibold">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-orders">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        db.ref('orders/').on('value', snapshot => {
            const table = document.getElementById('admin-orders');
            table.innerHTML = "";
            const orders = snapshot.val();
            
            for(let id in orders) {
                const o = orders[id];
                const status = o.status || "Pending";
                
                table.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4">${o.name}<br><span class="text-xs text-gray-400">${o.phone}</span></td>
                        <td class="p-4 font-medium">${o.product}</td>
                        <td class="p-4 text-blue-600 font-bold">${o.price}</td>
                        <td class="p-4">
                            <select onchange="updateStatus('${id}', this.value)" class="border border-gray-300 rounded p-1 text-sm">
                                <option ${status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option ${status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td class="p-4">
                            <button onclick="deleteOrder('${id}')" class="text-red-500 font-bold hover:underline">Delete</button>
                        </td>
                    </tr>`;
            }
        });

        function updateStatus(id, newStatus) {
            db.ref('orders/' + id).update({ status: newStatus });
        }

        function deleteOrder(id) {
            if(confirm("Are you sure you want to delete this order?")) {
                db.ref('orders/' + id).remove();
            }
        }
    </script>
</body>
</html>
