
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Live Orders</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding: 30px 5%; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .order-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .order-table th, .order-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .order-table th { background-color: #2575fc; color: white; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background-color: #ffeaa7; color: #d63031; }
        .refresh-btn { padding: 10px 20px; background-color: #2575fc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyStore - Google Sheets Admin Panel</div>
        <div><strong>Welcome, Owner Anand</strong></div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Live Customer Orders (Direct From Sheet)</h2>
            <button onclick="loadOrders()" class="refresh-btn">🔄 Refresh Orders</button>
        </div>
        
        <table class="order-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Delivery Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" style="text-align:center; padding:20px; color:#aaa;">Loading orders directly from Google Sheet...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // Automatically configured with your Google Sheet ID
        const sheetId = "1egaxp52uQ6j1WxXQcfYMM327Htyj33I_aMsMo91Tx-U";
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        function loadOrders() {
            const tableBody = document.getElementById('ordersTableBody');
            
            fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                const lines = csvText.split('\n');
                tableBody.innerHTML = "";
                
                let hasOrders = false;

                // Loop backwards to show the newest orders on top
                for (let i = lines.length - 1; i >= 1; i--) {
                    if (!lines[i].trim()) continue;
                    
                    // Split by CSV standards and clean quotes
                    const row = lines[i].split('","').map(item => item.replace(/^"|"$/g, '').trim());
                    
                    if (row.length < 5) continue;
                    hasOrders = true;

                    const orderId = row[0] || "N/A";
                    const name = row[1] || "N/A";
                    const phone = row[2] || "N/A";
                    const product = row[3] || "N/A";
                    const price = row[4] || "N/A";
                    const address = row[5] || "N/A";
                    const status = row[6] || "Pending";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${orderId}</td>
                        <td><strong>${name}</strong></td>
                        <td>${phone}</td>
                        <td>${product}</td>
                        <td>$${price}</td>
                        <td>${address}</td>
                        <td><span class="status-badge status-pending">${status}</span></td>
                    `;
                    tableBody.appendChild(tr);
                }

                if (!hasOrders) {
                    tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:20px; color:#aaa;">No orders found in Google Sheet.</td></tr>;
                }
            })
            .catch(error => {
                tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:20px; color:red;">Error connecting directly to Google Sheet. Please check Sheet Sharing settings.</td></tr>;
                console.error(error);
            });
        }

        window.onload = loadOrders;
        // Auto refresh every 10 seconds
        setInterval(loadOrders, 10000); 
    </script>
</body>
</html>
