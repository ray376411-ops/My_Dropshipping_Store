<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Realtime Logistics Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding: 40px 5%; max-width: 1300px; margin: 0 auto; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .order-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .order-table th, .order-table td { padding: 16px; text-align: left; border-bottom: 1px solid #f1f2f6; }
        .order-table th { background-color: #2575fc; color: white; font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background-color: #ffeaa7; color: #d63031; }
        .refresh-btn { padding: 10px 22px; background-color: #2575fc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { background-color: #1a5ecc; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">MyStore - Operations Management Center</div>
            <div><strong>Access Scope: Root Owner Anand</strong></div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Realtime Incoming Consumer Order Invoices</h2>
            <button onclick="loadOrders()" class="refresh-btn">🔄 Refresh Dashboard Stream</button>
        </div>
        
        <table class="order-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Contact Phone</th>
                    <th>Product Title</th>
                    <th>Price Captured</th>
                    <th>Shipping Destination</th>
                    <th>Logistics Status</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" style="text-align:center; padding:30px; color:#888;">Establishing API network handshake pipeline with Google Apps Script node...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // Secure Target Endpoint Root Node Mapping Mapping
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyMOWfLzr742-CeLnIWEI_-f2-vETiRWn8NKBDzRy3JnaRe4ZwDbOB24JFXilSLBL67/exec";

        function loadOrders() {
            const tableBody = document.getElementById('ordersTableBody');
            
            fetch(scriptUrl, { method: 'GET', cache: 'no-cache' })
            .then(response => {
                if (!response.ok) throw new Error('Data transmission integrity validation failed from core API');
                return response.json();
            })
            .then(data => {
                tableBody.innerHTML = "";
                
                if (!data || data.length === 0) {
                    tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:30px; color:#aaa;">No consumer purchase metadata records found inside backend database storage.</td></tr>;
                    return;
                }

                // Map database nodes and execute lifo loop structure (Newest first)
                for (let i = data.length - 1; i >= 0; i--) {
                    const row = data[i];
                    
                    const orderId = row.Order_ID || "N/A";
                    const name = row.Customer_Name || "N/A";
                    const phone = row.Phone || "N/A";
                    const product = row.Product || "N/A";
                    const price = row.Price ? ${parseFloat(row.Price).toFixed(2)} : "N/A";
                    const address = row.Address || "N/A";
                    const status = row.Status || "Pending";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>#${orderId}</strong></td>
                        <td>${name}</td>
                        <td>${phone}</td>
                        <td><span style="color:#2575fc; font-weight:600;">${product}</span></td>
                        <td><strong>${price}</strong></td>
                        <td>${address}</td>
                        <td><span class="status-badge status-pending">${status}</span></td>
                    `;
                    tableBody.appendChild(tr);
                }
            })
            .catch(error => {
                tableBody.innerHTML = <tr><td colspan="7" style="text-align:center; padding:30px; color:#d63031; font-weight:600;">Data ingestion runtime error. Check Google Apps Script compilation parameters.</td></tr>;
                console.error(error);
            });
        }

        // Auto-run routine initialization loop
        window.onload = loadOrders;
        setInterval(loadOrders, 12000); 
    </script>
</body>
</html>
