<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('live_orders/').on('value', (snapshot) => {
            const rowsContainer = document.getElementById('pipeline-rows');
            rowsContainer.innerHTML = "";
            const data = snapshot.val();
            
            if(!data) {
                rowsContainer.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-slate-400 font-medium">Pipeline empty.</td></tr>`;
                return;
            }

            const activeOrdersList = Object.values(data).reverse();
            activeOrdersList.forEach(order => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4">${order.orderId}</td>
                    <td class="px-6 py-4">${order.time}</td>
                    <td class="px-6 py-4">${order.customerName}</td>
                    <td class="px-6 py-4">${order.itemsPurchased}</td>
                    <td class="px-6 py-4">${order.totalAmount}</td>
                    <td class="px-6 py-4">${order.status}</td>
                `;
                rowsContainer.appendChild(tr);
            });
        });
    </script>
</body>
</html>
