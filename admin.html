<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Trendspot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-8 border-b border-gray-700 pb-4">Live Orders Dashboard</h1>
    
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <table class="w-full text-black">
            <thead class="bg-gray-100">
                <tr class="text-left">
                    <th class="p-4">Customer</th>
                    <th class="p-4">Product</th>
                    <th class="p-4">Price</th>
                    <th class="p-4">Status</th>
                    <th class="p-4">Actions</th>
                </tr>
            </thead>
            <tbody id="admin-orders">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        db.ref('orders/').on('value', snapshot => {
            const table = document.getElementById('admin-orders');
            table.innerHTML = "";
            const orders = snapshot.val();
            
            for(let id in orders) {
                const o = orders[id];
                const status = o.status || "Pending";
                
                table.innerHTML += `
                    <tr class="border-b">
                        <td class="p-4">${o.name}<br><small class="text-gray-500">${o.phone}</small></td>
                        <td class="p-4 font-bold">${o.product}</td>
                        <td class="p-4">${o.price}</td>
                        <td class="p-4">
                            <select onchange="updateStatus('${id}', this.value)" class="border p-1 rounded">
                                <option ${status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option ${status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td class="p-4">
                            <button onclick="deleteOrder('${id}')" class="bg-red-600 text-white px-3 py-1 rounded">Delete</button>
                        </td>
                    </tr>`;
            }
        });

        function updateStatus(id, newStatus) {
            db.ref('orders/' + id).update({ status: newStatus });
        }

        function deleteOrder(id) {
            if(confirm("Are you sure you want to delete this order?")) {
                db.ref('orders/' + id).remove();
            }
        }
    </script>
</body>
</html>
