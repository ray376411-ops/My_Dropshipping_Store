<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - My Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding: 30px 5%; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .order-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .order-table th, .order-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .order-table th { background-color: #2575fc; color: white; font-weight: 600; }
        .order-table tr:hover { background-color: #f9f9f9; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background-color: #ffeaa7; color: #d63031; }
        .status-shipped { background-color: #badc58; color: #6ab04c; }
        .action-btn { padding: 6px 12px; background-color: #2ed573; color: white; border-radius: 4px; font-size: 13px; width: auto; display: inline-block; margin-right: 5px; }
        .delete-btn { background-color: #ff4757; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyStore - Admin Panel</div>
        <div><strong>Welcome, Owner</strong></div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Customer Orders Management</h2>
            <button onclick="clearAllOrders()" class="action-btn delete-btn">Clear All Orders</button>
        </div>

        <table class="order-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Delivery Address</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                </tbody>
        </table>
    </div>

    <script>
        function loadOrders() {
            const tableBody = document.getElementById('ordersTableBody');
            let orders = [];
            
            try {
                orders = JSON.parse(localStorage.getItem('dropship_orders')) || [];
            } catch(e) {
                orders = [];
            }

            tableBody.innerHTML = "";

            if (orders.length === 0) {
                tableBody.innerHTML = <tr><td colspan="8" style="text-align:center; padding:30px; color:#aaa;">No orders received yet. Try placing an order on index.html and refresh this page.</td></tr>;
                return;
            }

            orders.forEach(order => {
                const tr = document.createElement('tr');
                const statusClass = order.status === 'Pending' ? 'status-pending' : 'status-shipped';

                tr.innerHTML = `
                    <td>#${order.id}</td>
                    <td><strong>${order.name}</strong></td>
                    <td>${order.phone}</td>
                    <td>${order.product}</td>
                    <td>$${order.price}</td>
                    <td>${order.address}</td>
                    <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                    <td>
                        ${order.status === 'Pending' ? <button class="action-btn" onclick="shipOrder(${order.id})">Mark Shipped</button> : ''}
                        <button class="action-btn delete-btn" onclick="deleteOrder(${order.id})">Delete</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function shipOrder(orderId) {
            let orders = JSON.parse(localStorage.getItem('dropship_orders')) || [];
            orders = orders.map(order => {
                if (order.id === orderId) order.status = "Shipped";
                return order;
            });
            localStorage.setItem('dropship_orders', JSON.stringify(orders));
            loadOrders();
        }

        function deleteOrder(orderId) {
            if(confirm("Are you sure?")) {
                let orders = JSON.parse(localStorage.getItem('dropship_orders')) || [];
                orders = orders.filter(order => order.id !== orderId);
                localStorage.setItem('dropship_orders', JSON.stringify(orders));
                loadOrders();
            }
        }

        function clearAllOrders() {
            if(confirm("Clear everything?")) {
                localStorage.removeItem('dropship_orders');
                loadOrders();
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
