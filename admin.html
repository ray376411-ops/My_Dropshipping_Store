<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Trendspot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-6 border-b border-gray-700 pb-4">Live Orders Dashboard</h1>
    
    <div class="overflow-x-auto">
        <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
            <thead class="bg-gray-700">
                <tr>
                    <th class="p-4 text-left">Customer</th>
                    <th class="p-4 text-left">Phone</th>
                    <th class="p-4 text-left">Address</th>
                    <th class="p-4 text-left">Product</th>
                    <th class="p-4 text-left">Price</th>
                </tr>
            </thead>
            <tbody id="admin-orders">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        
        // Real-time tracking
        firebase.database().ref('orders/').on('value', snapshot => {
            const table = document.getElementById('admin-orders');
            table.innerHTML = "";
            const orders = snapshot.val();
            
            for(let id in orders) {
                const o = orders[id];
                table.innerHTML += `
                    <tr class="border-b border-gray-700 hover:bg-gray-750">
                        <td class="p-4">${o.name}</td>
                        <td class="p-4">${o.phone}</td>
                        <td class="p-4">${o.address}, ${o.pin}</td>
                        <td class="p-4 font-bold text-blue-400">${o.product}</td>
                        <td class="p-4">${o.price}</td>
                    </tr>`;
            }
        });
    </script>
</body>
</html>
