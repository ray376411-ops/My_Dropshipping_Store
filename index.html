<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TREND SPOT | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(18px); }
        .hero-gradient { background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 30%), radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.25), transparent 30%), #0f172a; }
        .smooth { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-[#f6f7fb] text-gray-900">

    <!-- Navbar/Hero/Products सेक्शन यहाँ वैसे ही रहेंगे (कोड बड़ा न हो इसलिए संक्षिप्त किया गया है) -->

    <!-- PRODUCT MODAL -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white w-full max-w-2xl rounded-[35px] overflow-hidden shadow-2xl">
            <div class="grid md:grid-cols-2">
                <div class="bg-gray-100 p-6"><img id="modalImg" class="w-full h-full object-cover rounded-[25px]"></div>
                <div class="p-8 overflow-y-auto max-h-[80vh]">
                    <h2 id="modalTitle" class="text-4xl font-black mb-2"></h2>
                    <p id="modalPrice" class="text-2xl font-black text-blue-600 mb-4"></p>
                    
                    <!-- Updated Customer Form -->
                    <div class="space-y-3 mb-6">
                        <input type="text" id="customerName" placeholder="Full Name" class="w-full border p-3 rounded-xl">
                        <input type="tel" id="customerPhone" placeholder="Phone Number" class="w-full border p-3 rounded-xl">
                        <input type="text" id="houseNumber" placeholder="House/Flat No." class="w-full border p-3 rounded-xl">
                        <input type="text" id="roadName" placeholder="Road/Area Name" class="w-full border p-3 rounded-xl">
                        <input type="number" id="pinCode" placeholder="Pin Code" class="w-full border p-3 rounded-xl">
                        <input type="text" id="city" placeholder="City" class="w-full border p-3 rounded-xl">
                    </div>
                    <button onclick="placeOrder()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Place Order</button>
                    <button onclick="closeModal()" class="w-full mt-2 bg-gray-100 py-4 rounded-2xl">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div id="cartSidebar" class="fixed top-0 right-[-100%] w-full md:w-[420px] h-full bg-white z-50 shadow-2xl smooth p-6 overflow-y-auto">
        <h2 class="text-3xl font-black mb-6">Your Cart</h2>
        <div id="cart-items" class="space-y-4"></div>
        
        <!-- Updated Cart Form -->
        <div class="space-y-3 mt-8">
            <input type="text" id="cartCustomerName" placeholder="Full Name" class="w-full border p-3 rounded-xl">
            <input type="tel" id="cartCustomerPhone" placeholder="Phone Number" class="w-full border p-3 rounded-xl">
            <input type="text" id="cartHouseNumber" placeholder="House/Flat No." class="w-full border p-3 rounded-xl">
            <input type="text" id="cartRoadName" placeholder="Road/Area Name" class="w-full border p-3 rounded-xl">
            <input type="number" id="cartPinCode" placeholder="Pin Code" class="w-full border p-3 rounded-xl">
            <input type="text" id="cartCity" placeholder="City" class="w-full border p-3 rounded-xl">
        </div>
        
        <button onclick="checkoutOrder()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-bold">Place Order</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { /* आपका कॉन्फ़िगरेशन वही रहेगा */ };
        firebase.initializeApp(firebaseConfig);

        function placeOrder() {
            const data = {
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                house: document.getElementById('houseNumber').value,
                road: document.getElementById('roadName').value,
                pin: document.getElementById('pinCode').value,
                city: document.getElementById('city').value
            };
            if (!data.name || !data.phone || !data.pin) return alert("Please fill required fields!");

            const orderRef = firebase.database().ref("orders").push();
            orderRef.set({
                orderId: orderRef.key,
                customerDetails: data,
                product: window.activeProduct.title,
                price: window.activeProduct.price,
                createdAt: new Date().toLocaleString()
            });
            alert("Order Success! ID: " + orderRef.key);
            closeModal();
        }

        function checkoutOrder() {
            const data = {
                name: document.getElementById('cartCustomerName').value,
                phone: document.getElementById('cartCustomerPhone').value,
                house: document.getElementById('cartHouseNumber').value,
                road: document.getElementById('cartRoadName').value,
                pin: document.getElementById('cartPinCode').value,
                city: document.getElementById('cartCity').value
            };
            if (!data.name || !data.phone || !data.pin) return alert("Please fill required fields!");

            const orderRef = firebase.database().ref("orders").push();
            orderRef.set({
                orderId: orderRef.key,
                customerDetails: data,
                items: cart,
                total: document.getElementById('cart-total').innerText,
                createdAt: new Date().toLocaleString()
            });
            alert("Order Success! ID: " + orderRef.key);
            cart = []; updateCart(); toggleCart();
        }
    </script>
</body>
</html>
