!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operation 300 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="p-6 bg-white shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">OPERATION 300</h1>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <h3 class="text-xl font-bold mb-2">Premium Wireless Earbuds</h3>
            <p class="text-blue-600 font-bold mb-4">₹1,299</p>
            <div class="flex gap-2">
                <button onclick="addToCart('Wireless Earbuds', '₹1,299')" class="w-1/2 border border-blue-600 py-2 rounded">Add to Cart</button>
                <button onclick="openCheckout('Wireless Earbuds', '₹1,299')" class="w-1/2 bg-blue-600 text-white py-2 rounded">Buy Now</button>
            </div>
        </div>
    </main>

    <div id="checkoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Complete Order</h2>
            <input type="text" id="name" placeholder="Full Name" class="w-full border p-2 mb-2 rounded">
            <input type="text" id="phone" placeholder="Phone Number" class="w-full border p-2 mb-2 rounded">
            <input type="text" id="address" placeholder="Address" class="w-full border p-2 mb-2 rounded">
            <input type="text" id="pin" placeholder="Pin Code" class="w-full border p-2 mb-4 rounded">
            <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-2 rounded font-bold">Place Order (COD)</button>
            <button onclick="document.getElementById('checkoutModal').classList.add('hidden')" class="w-full mt-2 text-gray-500">Cancel</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedProduct = "";
        let selectedPrice = "";

        function addToCart(item, price) {
            db.ref('cart/').push({ item, price });
            alert("Added to Cart!");
        }

        function openCheckout(item, price) {
            selectedProduct = item;
            selectedPrice = price;
            document.getElementById('checkoutModal').classList.remove('hidden');
        }

        function placeOrder() {
            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                pin: document.getElementById('pin').value,
                product: selectedProduct,
                price: selectedPrice,
                status: "Pending"
            };

            if(orderData.name && orderData.phone) {
                db.ref('orders/').push(orderData);
                alert("Order Placed Successfully!");
                document.getElementById('checkoutModal').classList.add('hidden');
            } else {
                alert("Please fill all fields!");
            }
        }
    </script>
</body>
</html>
