<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendspot Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>Trendspot Store</h1>
    </nav>

    <div class="container">
        <div id="product-grid" class="grid"></div>

        <section id="checkout">
            <h2>Checkout Details</h2>
            <input type="text" id="custName" placeholder="Full Name" required>
            <input type="text" id="custAddress" placeholder="Address" required>
            <input type="text" id="custPhone" placeholder="Phone Number" required>
            <input type="text" id="custPincode" placeholder="Pincode" required>
            <button id="submitOrder" onclick="placeOrder()">Place Order</button>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
