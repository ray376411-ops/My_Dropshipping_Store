<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendspot Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Trendspot Premium Store</h1>
</header>

<!-- Categories Section -->
<div class="category-nav">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('Electronics')">Electronics</button>
    <button onclick="filterProducts('Apparel')">Apparel</button>
    <button onclick="filterProducts('Home')">Home</button>
    <button onclick="filterProducts('Beauty')">Beauty</button>
    <button onclick="filterProducts('Sports')">Sports</button>
</div>

<div id="product-grid" class="grid"></div>

<!-- Order Modal -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Place Order</h2>
        <input type="text" id="custName" placeholder="Full Name">
        <input type="text" id="custPhone" placeholder="Phone Number">
        <input type="text" id="custAddress" placeholder="Address">
        <input type="text" id="custPincode" placeholder="Pincode">
        <button id="confirmOrderBtn" onclick="submitOrder()">Confirm Order</button>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
