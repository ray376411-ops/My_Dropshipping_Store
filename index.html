<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trendspot Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold text-center mb-10">Trending Global Products</h1>
    
    <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Your SDK Config
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Products from Firebase
        db.ref('products/').on('value', (snapshot) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ""; // Clear existing
            const products = snapshot.val();
            
            if (products) {
                Object.keys(products).forEach(key => {
                    const p = products[key];
                    grid.innerHTML += `
                        <div class="bg-white p-5 rounded-xl shadow-lg">
                            <img src="${p.image}" class="w-full h-48 object-cover rounded-lg">
                            <h2 class="text-xl font-bold mt-3">${p.title}</h2>
                            <p class="text-indigo-600 font-bold text-lg">${p.price}</p>
                            <button onclick="addToCart('${p.title}', '${p.price}')" 
                                    class="w-full bg-black text-white py-2 mt-4 rounded-lg hover:bg-gray-800">
                                Add to Cart
                            </button>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p>No products found. Please add products via Admin Panel.</p>";
            }
        });

        function addToCart(title, price) {
            alert("Added " + title + " to your cart!");
            db.ref('orders/').push({ item: title, price: price, time: new Date().toLocaleTimeString() });
        }
    </script>
</body>
</html>
