<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dropshipping Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">TrendStore</div>
        <div class="cart-icon">🛒 Cart (<span id="cart-count">0</span>)</div>
    </header>

    <section class="hero">
        <h1>Premium Products, Unbeatable Prices</h1>
        <p>Order today and get Free Shipping worldwide!</p>
    </section>

    <main class="products-container" id="productGrid">
        </main>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Enter Delivery Details</h2>
            <form id="orderForm" onsubmit="submitOrder(event)">
                <input type="text" id="custName" placeholder="Your Full Name" required>
                <input type="tel" id="custPhone" placeholder="Mobile Number" required>
                <textarea id="custAddress" placeholder="Complete Delivery Address with Pincode" required></textarea>
                <p><strong>Product:</strong> <span id="modalProdName"></span></p>
                <p><strong>Total Price:</strong> $<span id="modalProdPrice"></span> (Cash on Delivery)</p>
                <button type="submit" class="btn-confirm" id="submitBtn">Confirm Order</button>
            </form>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycby8tSZCuEDG-PBbcvgpTl9IIqIlOdqsHlzmYC7CSVL-astMMWO1zs3Rr7EeAWADgCQ/exec";

        const myProducts = [
            { id: 1, name: "Premium Bluetooth Smartwatch", price: 49.99, oldPrice: 99.99, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
            { id: 2, name: "Wireless Noise-Canceling Headphones", price: 79.99, oldPrice: 149.99, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
            { id: 3, name: "Ultra Lightweight Sports Shoes", price: 59.99, oldPrice: 119.99, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" }
        ];

        function displayProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            myProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">$${product.price} <span class="old-price">$${product.oldPrice}</span></p>
                    <button class="btn-add-to-cart" onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
                    <button class="btn-buy-now" onclick="openOrderModal('${product.name}', ${product.price})">Order Now (COD)</button>
                `;
                grid.appendChild(card);
            });
        }
        window.onload = displayProducts;

        let cartCount = 0; 
        let currentProduct = ""; 
        let currentPrice = 0;

        function addToCart(name, price) { 
            cartCount++; 
            document.getElementById('cart-count').innerText = cartCount; 
            alert(name + " added to cart!"); 
        }

        function openOrderModal(name, price) { 
            currentProduct = name; 
            currentPrice = price; 
            document.getElementById('modalProdName').innerText = name; 
            document.getElementById('modalProdPrice').innerText = price; 
            document.getElementById('orderModal').style.display = "block"; 
        }

        function closeModal() { 
            document.getElementById('orderModal').style.display = "none"; 
        }

        function submitOrder(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Placing Order...";
            submitBtn.disabled = true;

            const orderData = {
                id: Math.floor(1000 + Math.random() * 9000),
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                product: currentProduct,
                price: currentPrice,
                status: "Pending"
            };

            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            })
            .then(() => {
                alert("Congratulations! Your order has been placed successfully.");
                closeModal();
                document.getElementById('orderForm').reset();
            })
            .catch(error => {
                alert("Error placing order. Please try again.");
                console.error(error);
            })
            .finally(() => {
                submitBtn.innerText = "Confirm Order";
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
