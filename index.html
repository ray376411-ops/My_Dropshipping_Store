<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDSPOT | Premium Marketplace</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function submitOrder(prodTitle, prodPrice) {
            const timestamp = new Date().toLocaleTimeString();
            const generatedOrderId = "#ORD-" + Math.floor(100000 + Math.random() * 900000);
            
            const databasePayload = {
                orderId: generatedOrderId,
                time: timestamp,
                customerName: "Global Web Customer",
                itemsPurchased: prodTitle,
                totalAmount: prodPrice,
                status: "Pending"
            };

            database.ref('live_orders/').push(databasePayload)
            .then(() => alert("Order placed successfully! Order ID: " + generatedOrderId))
            .catch(err => console.error("Transmission error:", err));
        }
    </script>
</body>
</html>
