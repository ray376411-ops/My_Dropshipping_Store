
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREND SPOT | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <nav class="bg-white p-5 shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tighter">TREND SPOT</h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6" id="product-grid"></main>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white p-6 rounded-3xl w-full max-w-lg shadow-2xl">
            <img id="modalImg" class="w-full h-64 object-cover rounded-2xl mb-4">
            <h2 id="modalTitle" class="text-3xl font-bold mb-2"></h2>
            <p id="modalPrice" class="text-2xl font-black text-blue-600 mb-4"></p>
            <p id="modalDesc" class="text-gray-600 mb-6"></p>
            
            <div class="grid grid-cols-4 gap-2 mb-6" id="gallery">
                </div>

            <div class="flex gap-4">
                <button onclick="closeModal()" class="w-1/2 bg-gray-200 py-3 rounded-xl font-bold">Close</button>
                <button onclick="openCheckout()" class="w-1/2 bg-blue-600 text-white py-3 rounded-xl font-bold">Buy Now</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk", databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com", projectId: "trendspot-store" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const products = [
            { id: 1, title: "Wireless Headphones", price: "₹1,999", desc: "Premium sound quality with noise cancellation.", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500", gallery: ["https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=100", "https://images.unsplash.com/photo-1524678606370-a47ad25cb82a?w=100"] },
            { id: 2, title: "Smart Watch", price: "₹2,499", desc: "Track your health with advanced sensors.", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500", gallery: ["https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100", "https://images.unsplash.com/photo-1434493789847-2f30dc6b336c?w=100"] }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-4 rounded-3xl shadow-sm border cursor-pointer hover:shadow-xl transition">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-2xl mb-4">
                    <h3 class="text-xl font-bold">${p.title}</h3>
                    <p class="text-blue-600 font-bold">${p.price}</p>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = products.find(prod => prod.id === id);
            window.activeProduct = p;
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalPrice').innerText = p.price;
            document.getElementById('modalDesc').innerText = p.desc;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        
        function openCheckout() {
            alert("Proceeding to checkout for " + window.activeProduct.title);
        }

        renderProducts();
    </script>
</body>
</html>
