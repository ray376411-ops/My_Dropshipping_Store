<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendspot Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <nav class="bg-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-700">TRENDSPOT</h1>
            <div class="flex gap-4">
                <button onclick="filterProducts('All')" class="font-bold">All</button>
                <button onclick="filterProducts('Gadgets')" class="font-bold">Gadgets</button>
                <button onclick="filterProducts('Fashion')" class="font-bold">Fashion</button>
            </div>
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Cart (0)</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8" id="product-grid">
        </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGMiL4zA9yM48RgxKaa30Ge8wPG_FDomk",
            authDomain: "trendspot-store.firebaseapp.com",
            databaseURL: "https://trendspot-store-default-rtdb.firebaseio.com",
            projectId: "trendspot-store",
            storageBucket: "trendspot-store.firebasestorage.app",
            messagingSenderId: "195199081717",
            appId: "1:195199081717:web:3b14a6a93f0cf64d6ab9bc",
            measurementId: "G-RE8DDQ5SWN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const products = [
            { title: "Wireless Earbuds", price: "₹1,299", category: "Gadgets", img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=600" },
            { title: "Smart Watch", price: "₹2,499", category: "Gadgets", img: "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?w=600" },
            { title: "Leather Jacket", price: "₹3,999", category: "Fashion", img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600" },
            { title: "Classic Shades", price: "₹899", category: "Fashion", img: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600" },
            { title: "Gaming Mouse", price: "₹1,500", category: "Gadgets", img: "https://images.unsplash.com/photo-1527864550417-7fd91051a365?w=600" },
            { title: "Denim Jeans", price: "₹1,800", category: "Fashion", img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=600" }
        ];

        function display(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-xl hover:scale-105 transition duration-300">
                        <img src="${p.img}" class="w-full h-56 object-cover rounded-2xl mb-4">
                        <h3 class="text-xl font-bold">${p.title}</h3>
                        <p class="text-indigo-600 font-bold mb-4">${p.price}</p>
                        <button onclick="addToCart('${p.title}', '${p.price}')" 
                                class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Add to Cart</button>
                    </div>`;
            });
        }

        function filterProducts(cat) {
            if(cat === 'All') display(products);
            else display(products.filter(p => p.category === cat));
        }

        function addToCart(title, price) {
            db.ref('cart/').push({ item: title, price: price });
            alert(title + " has been added to your cart successfully!");
        }

        display(products);
    </script>
</body>
</html>
